<div class="min-h-screen flex items-center justify-center bg-gray-100">
  
  <div class="w-full max-w-sm bg-white p-6 rounded-2xl shadow-md">
    
    <h2 class="text-2xl font-bold text-center mb-6">
      Iniciar Sesión
    </h2>

  <input
  class="w-full mb-3 p-2 border rounded-lg"
  type="text"
  placeholder="Usuario"
  [(ngModel)]="username"
/>

<input
  class="w-full mb-3 p-2 border rounded-lg"
  type="password"
  placeholder="Contraseña"
  [(ngModel)]="password"
/>

  <button
  class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
  (click)="login()"
>
  Entrar
</button>

  <!-- mensaje errores -->
   <p *ngIf="error" class="text-red-500 text-sm mt-3 text-center">
  {{ error }}
</p>

  <p class="text-center text-sm mt-4">
  <a routerLink="/recovery-password" class="text-blue-600">
    ¿Olvidaste tu contraseña?
  </a>
</p>

<p class="text-center text-sm mt-2">
  ¿No tienes cuenta?
  <a routerLink="/register" class="text-blue-600 font-semibold">
    Crear cuenta
  </a>
</p>
  
  </div>
</div>
