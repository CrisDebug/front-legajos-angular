<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="w-full max-w-sm bg-white p-6 rounded-2xl shadow-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Recuperar Contraseña
    </h2>

    <input
      class="w-full mb-3 p-2 border rounded-lg"
      type="email"
      placeholder="Ingresa tu email"
      [(ngModel)]="email"
    />

    <button
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
      (click)="sendRecovery()"
    >
      Enviar
    </button>

    <p *ngIf="message" class="text-green-600 text-sm mt-3 text-center">
      {{ message }}
    </p>

    <p class="text-center text-sm mt-4">
      <a routerLink="/login" class="text-blue-600 font-semibold">
        Volver al login
      </a>
    </p>

  </div>
</div>
