<div *ngIf="legajo" 
     class="border rounded-lg shadow p-4 hover:shadow-lg transition bg-white cursor-pointer"
     (click)="onSelect()">

  <h3 class="text-lg font-semibold text-gray-800">{{ legajo.tituloLegajo }}</h3>
  <p class="text-gray-600">ID: {{ legajo.id }}</p>
  <p class="text-gray-600">Casillero: {{ casilleroNombre }}</p>
  <p class="text-gray-600">Fecha inicio: {{ legajo.fechaInicioLegajo || 'No asignada' }}</p>
  <p class="text-gray-500">Fecha término: {{ legajo.fechaFinLegajo || 'No asignada' }}</p>

  <!-- Título para el textarea -->
  <label for="descripcion" class="block text-gray-700 font-semibold mt-2 mb-1">
    Descripción del legajo
  </label>

  <!-- Textarea readonly -->
  <textarea id="descripcion" 
            name="descripcion"
            rows="4" 
            readonly
            [value]="legajo.descripcionLegajo || 'No hay descripción disponible'"
            class="w-full p-2 border border-gray-300 rounded resize-none bg-slate-50 text-gray-700">
  </textarea>
            
  <!-- Botón abajo del textarea -->
  <button (click)="onBuscarDocumentos()"
          class="mt-2 px-2 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">
    Buscar documentos
  </button>
</div>
